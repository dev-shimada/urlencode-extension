name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: url-encoder-extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: url-encoder-extension

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update manifest version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          node -e "
            const fs = require('fs');
            const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
            manifest.version = '$VERSION';
            fs.writeFileSync('manifest.json', JSON.stringify(manifest, null, 2));
            console.log('manifest.json version updated to', '$VERSION');
          "
        working-directory: url-encoder-extension

      - name: Build extension
        run: npm run build
        working-directory: url-encoder-extension

      - name: Install zip
        run: sudo apt-get install -y zip

      - name: Package extension (.zip)
        run: mkdir -p release && (cd dist && zip -r ../release/url-encoder-extension.zip .)
        working-directory: url-encoder-extension

      - name: Rename artifact with version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mv release/url-encoder-extension.zip "release/url-encoder-extension-v${VERSION}.zip"
        working-directory: url-encoder-extension

      - name: Generate release notes
        id: release_notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat <<EOF > release_notes.md
          ## URL Encoder Extension v${VERSION}

          ### インストール方法

          #### Chrome Web Store (推奨)
          *(審査通過後に利用可能)*

          #### 手動インストール (.zip / アンパック)
          1. \`url-encoder-extension-v${VERSION}.zip\` をダウンロードして解凍
          2. Chrome で \`chrome://extensions/\` を開く
          3. **デベロッパーモード** をオンにする
          4. **パッケージ化されていない拡張機能を読み込む** → 解凍したフォルダを選択

          ### 機能
          - URLの選択した範囲を \`encodeURIComponent\` / \`decodeURIComponent\` で変換
          - URL構造（プロトコル・ホスト・パス・クエリパラメータ）を色分けプレビュー
          - 変換後のURLへのワンクリックナビゲーション
          EOF
        working-directory: url-encoder-extension

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body_path: url-encoder-extension/release_notes.md
          files: |
            url-encoder-extension/release/url-encoder-extension-v${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
